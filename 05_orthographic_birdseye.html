<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>vol_09 / 05 — 並行投影 × スクロール 鳥瞰ビュー</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      color: #1c2733;
      font-family: system-ui, sans-serif;
    }
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .spacer {
      height: 400vh; /* スクロール領域を確保するだけの空div */
    }
    .hint {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 0.85rem;
      opacity: 0.6;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="hint">↓ スクロールすると街の上を進みます</div>
  <canvas id="bg"></canvas>
  <div class="spacer"></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('bg');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // 真っ白の背景

    // 並行投影カメラ
    const aspect = innerWidth / innerHeight;
    const viewSize = 10; // 視野の縦サイズ
    const camera = new THREE.OrthographicCamera(
      -viewSize * aspect, viewSize * aspect, // left, right
       viewSize, -viewSize,                   // top, bottom
       0.1, 200                               // near, far
    );
    // 斜め上から見下ろす位置に置く（建物が右上→左下に流れるよう、x方向を反転）
    camera.position.set(-20, 20, 20);
    camera.lookAt(0, 0, 0);

    // 地面（真っ白）
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 200),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 建物を等間隔に並べる
    for (let i = 0; i < 60; i++) {
      const h = 1 + Math.random() * 3;
      const palette = [0x88bbee, 0xaaccee, 0xbbddf2, 0xcce4f5];
      const building = new THREE.Mesh(
        new THREE.BoxGeometry(1, h, 1),
        new THREE.MeshLambertMaterial({
          color: palette[i % palette.length],
        })
      );
      building.position.set(i * 3 - 30, h / 2, (i % 2) * 2);
      scene.add(building);
    }

    // ライティング：全体を明るく、立体感を出すため複数方向から光を当てる
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 10, 5);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-8, 6, -5);
    scene.add(fill);

    // スクロール位置をそのままカメラ位置に反映（イージングなし）
    function updateCamera() {
      const ratio = window.scrollY / (document.body.scrollHeight - innerHeight);
      camera.position.x = 60 - ratio * 80; // 街の上を逆方向に進む
      camera.lookAt(camera.position.x + 20, 0, camera.position.z - 20);
    }
    window.addEventListener('scroll', updateCamera);
    updateCamera();

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // リサイズ対応
    window.addEventListener('resize', () => {
      const a = innerWidth / innerHeight;
      camera.left = -viewSize * a;
      camera.right = viewSize * a;
      camera.top = viewSize;
      camera.bottom = -viewSize;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
