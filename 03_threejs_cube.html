<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>vol_09 / 03 — three.js で回転する立方体</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
    canvas { display: block; }
    .label {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="label">サンプル03：three.js で回転する立方体</div>
  <canvas id="c"></canvas>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const width = window.innerWidth;
    const height = window.innerHeight;
    // const camera = new THREE.PerspectiveCamera(
    //   100,
    //   width / height,
    //   0.1,
    //   1000
    // );
    const camera = new THREE.OrthographicCamera(
      -5 * width / height, 5 * width / height,
      5, -5,
      0.1, 100
    );
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('c'),
      antialias: true,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.75, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xdd9999 })
    );
    scene.add(sphere);

    const torus01 = new THREE.Mesh(
      new THREE.TorusGeometry(0.9, 0.025, 12, 48, Math.PI * 2),
      new THREE.MeshBasicMaterial({ color: 0x9999dd })
    );
    scene.add(torus01);

    const torus02 = new THREE.Mesh(
      new THREE.TorusGeometry(1, 0.025, 12, 48, Math.PI * 2),
      new THREE.MeshBasicMaterial({ color: 0x99dd99 })
    );
    scene.add(torus02);

    const torus03 = new THREE.Mesh(
      new THREE.TorusGeometry(1.1, 0.025, 12, 48, Math.PI * 2),
      new THREE.MeshBasicMaterial({ color: 0xdd9999 })
    );
    scene.add(torus03);
    torus03.rotation.x = Math.PI / 2;

    // scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(0, 2, 1);
    scene.add(light);

    function animate() {
      requestAnimationFrame(animate);
      torus01.rotation.x += 0.01;
      torus02.rotation.y += 0.01;
      torus03.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    // リサイズ対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
